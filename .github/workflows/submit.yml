name: Submit

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

env:
  CARGO_TERM_COLOR: always

jobs:
  version-bump:
    name: Version Bump
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - id: bump
        run: |
          CURRENT_VERSION=$(cargo metadata --manifest-path src-tauri/Cargo.toml --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "conao3-sa") | .version')
          echo "Current version: $CURRENT_VERSION"

          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"

          case "${{ github.event.inputs.version_bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          NEW_VERSION="${major}.${minor}.${patch}"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
      - run: |
          NEW="${{ steps.bump.outputs.new_version }}"
          sed -i "s/^version = \".*\"/version = \"$NEW\"/" src-tauri/Cargo.toml
          # Keep src-tauri/Cargo.lock in sync so cargo publish doesn't
          # try to rewrite it on the publish job and trip its dirty check.
          sed -i "/^name = \"conao3-sa\"\$/{n;s/^version = \".*\"/version = \"$NEW\"/;}" src-tauri/Cargo.lock
          cargo metadata --manifest-path src-tauri/Cargo.toml --no-deps --format-version=1 > /dev/null
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/Cargo.toml src-tauri/Cargo.lock
          git commit -m "bump version to ${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ steps.bump.outputs.new_version }}"

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [version-bump]
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version-bump.outputs.new_version }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: make -C frontend codegen
      - run: make dist
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-
            ${{ runner.os }}-cargo-
      # --allow-dirty is required because the SPA bundle in src-tauri/dist
      # is built fresh by `make dist` above and intentionally gitignored;
      # it is included in the package via Cargo.toml's `include` list.
      - run: cargo publish --no-verify --dry-run --allow-dirty
        working-directory: src-tauri
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish --no-verify --allow-dirty
        working-directory: src-tauri
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  release-headless:
    name: Release headless binary
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [version-bump, publish-crates]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version-bump.outputs.new_version }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: make -C frontend codegen
      - run: make dist
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-
      - run: cargo build --release --no-default-features --manifest-path src-tauri/Cargo.toml --bin sa
      - run: |
          mkdir -p release
          cp src-tauri/target/release/sa release/sa
          tar -C release -czf "sa-v${{ needs.version-bump.outputs.new_version }}-linux-x86_64.tar.gz" sa
      - run: |
          gh release create "v${{ needs.version-bump.outputs.new_version }}" \
            "sa-v${{ needs.version-bump.outputs.new_version }}-linux-x86_64.tar.gz" \
            --title "v${{ needs.version-bump.outputs.new_version }}" \
            --notes "Headless linux-x86_64 sa binary."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
